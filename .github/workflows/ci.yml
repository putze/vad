name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install --upgrade pip && pip install -e .[dev]
      - name: Ruff - format check
        run: ruff format --check .

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install --upgrade pip && pip install -e .[dev]
      - name: Ruff - lint
        run: ruff check .
      - name: Vulture - dead code
        run: vulture src/

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install --upgrade pip && pip install -e .[dev]
      - name: Bandit - security analysis
        run: bandit -r src/ -c pyproject.toml
      - name: pip-audit - dependency vulnerabilities
        run: pip-audit

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    needs: [format, lint, security]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install --upgrade pip
      - run: pip install -e .[dev]
      - name: Pytest
        run: pytest --cov --cov-fail-under=80 --cov-report=json --junitxml=results.xml
      - name: Step summary
        if: always()
        run: python .github/scripts/ci_summary.py

  docs:
      name: Docs
      runs-on: ubuntu-latest
      if: startsWith(github.ref, 'refs/tags/v')
      steps:
        - uses: actions/checkout@v6
        - uses: actions/setup-python@v6
          with:
            python-version: "3.11"
        - run: pip install --upgrade pip && pip install -e ".[docs]"
        - name: Sphinx - build docs
          run: sphinx-build -W -b html docs/ docs/_build/html
